<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>써클커넥션 Wiki</title>

<!-- Pretendard (SIL Open Font License 1.1 · 상업적 사용 무료) -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<!-- Supabase (공유 데이터베이스 + 구글 로그인) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#f7f7fb; --surface:#ffffff; --border:#ececf2; --line:#f1f1f6;
    --text:#16161a; --muted:#7a7a88; --soft:#9b9ba8;
    --brand:#5b5bf0; --brand2:#8b5cf6; --brand-ink:#4a4ae0;
    --grad:linear-gradient(135deg,#5b5bf0 0%,#8b5cf6 55%,#c061f0 100%);
    --grad-soft:linear-gradient(135deg,#eef0ff 0%,#f6effe 100%);
    --accent:#10b981; --warn:#f59e0b; --danger:#ef4444;
    --r:18px; --r-sm:12px; --r-pill:999px;
    --sh-sm:0 1px 2px rgba(20,20,40,.04),0 4px 16px rgba(20,20,40,.04);
    --sh:0 4px 24px rgba(30,25,80,.08),0 1px 3px rgba(30,25,80,.05);
    --sh-lg:0 24px 70px rgba(40,30,90,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:"Pretendard Variable",Pretendard,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;font-size:15px;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14.5px;color:var(--text)}
  a{color:var(--brand);text-decoration:none}
  .hidden{display:none!important}
  mark{background:linear-gradient(180deg,transparent 55%,#fde68a 55%);color:inherit;padding:0 1px;border-radius:2px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;
    border-radius:var(--r-pill);font-weight:600;font-size:14.5px;color:#fff;background:var(--brand);
    transition:transform .12s ease,box-shadow .2s ease,background .2s ease;white-space:nowrap}
  .btn:hover{transform:translateY(-1px)}
  .btn.grad{background:var(--grad);box-shadow:0 6px 20px rgba(110,80,240,.32)}
  .btn.grad:hover{box-shadow:0 10px 28px rgba(110,80,240,.42)}
  .btn.block{width:100%}
  .btn.ghost{background:#f2f2f7;color:#3a3a44}
  .btn.ghost:hover{background:#e9e9f1}
  .btn.outline{background:#fff;color:#3a3a44;border:1px solid var(--border)}
  .btn.outline:hover{background:#fafafc;border-color:#dcdce6}
  .btn.sm{padding:7px 13px;font-size:13px}
  .btn.ok{background:var(--accent);box-shadow:0 4px 14px rgba(16,185,129,.28)}
  .btn.ok:hover{background:#0ea372}
  .btn.warn{background:var(--warn)}
  .btn.danger{background:var(--danger);box-shadow:0 4px 14px rgba(239,68,68,.24)}
  .btn.danger:hover{background:#dc2f2f}
  .btn.erp{background:#16161a;color:#fff;box-shadow:0 4px 14px rgba(20,20,30,.2)}
  .btn.erp:hover{background:#2a2a33}

  .pill{display:inline-flex;align-items:center;font-size:11.5px;padding:3px 10px;border-radius:var(--r-pill);font-weight:700;letter-spacing:0}
  .pill.pending{background:#fff4e2;color:#c4790a}
  .pill.approved{background:#e3f8ef;color:#089463}
  .pill.rejected{background:#fde8e8;color:#d83a3a}
  .pill.hidden{background:#eeeef3;color:#76768a}

  /* AUTH */
  #auth{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr;background:var(--bg)}
  .auth-hero{position:relative;overflow:hidden;background:var(--grad);color:#fff;padding:64px 60px;
    display:flex;flex-direction:column;justify-content:space-between}
  .auth-hero::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.22),transparent 65%);top:-160px;right:-140px}
  .auth-hero::after{content:"";position:absolute;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.14),transparent 65%);bottom:-160px;left:-120px}
  .ah-top{position:relative;z-index:2}
  .ah-logo{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.02em}
  .ah-logo .mark{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.2);
    backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:18px}
  .ah-mid{position:relative;z-index:2}
  .ah-mid h1{font-size:40px;line-height:1.18;font-weight:800;letter-spacing:-.03em;margin-bottom:16px}
  .ah-mid p{font-size:16px;opacity:.92;max-width:380px;line-height:1.65}
  .ah-feats{position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
  .ah-feat{display:flex;align-items:center;gap:11px;font-size:14.5px;opacity:.95}
  .ah-feat .ck{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
  .auth-panel{display:flex;align-items:center;justify-content:center;padding:40px}
  .auth-card{width:100%;max-width:380px}
  .auth-card h2{font-size:25px;font-weight:800;letter-spacing:-.03em}
  .auth-card .sub{color:var(--muted);font-size:14px;margin-top:6px;margin-bottom:26px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:#4a4a54}
  .field input,.field select{width:100%;padding:12px 14px;border:1px solid var(--border);
    border-radius:var(--r-sm);background:#fafafc;outline:none;transition:.16s}
  .field input:focus,.field select:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px rgba(110,80,240,.1)}
  .google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;padding:13px;
    border:1px solid var(--border);border-radius:var(--r-sm);background:#fff;font-weight:600;color:#3a3a44}
  .google-btn:hover{background:#fafafc;border-color:#dcdce6}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--soft);font-size:12px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .note{font-size:12px;color:var(--soft);margin-top:10px;line-height:1.6}
  .auth-switch{text-align:center;margin-top:20px;font-size:13.5px;color:var(--muted)}
  .msg{font-size:13px;padding:10px 13px;border-radius:10px;margin-bottom:15px;line-height:1.5}
  .msg.err{background:#fde8e8;color:#c93030}
  .msg.info{background:#eef0ff;color:#4646cc}

  /* GATE */
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--grad-soft)}
  .gate-card{background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:var(--sh-lg);
    max-width:440px;width:100%;padding:40px;text-align:center}
  .gate-card .ic{font-size:42px}
  .gate-card h2{font-size:22px;font-weight:800;margin:14px 0 8px;letter-spacing:-.03em}
  .gate-card p{color:var(--muted);font-size:14.5px;line-height:1.7;margin-bottom:24px}

  /* SHELL */
  header.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 26px;height:64px}
  .brand{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:-.03em}
  .brand .mark{width:30px;height:30px;border-radius:9px;background:var(--grad);display:flex;align-items:center;
    justify-content:center;color:#fff;font-size:15px;box-shadow:0 4px 12px rgba(110,80,240,.34)}
  .top-search{flex:1;max-width:540px;position:relative}
  .top-search input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);
    border-radius:var(--r-pill);background:#f4f4f9;outline:none;transition:.16s}
  .top-search input:focus{background:#fff;border-color:var(--brand);box-shadow:0 0 0 4px rgba(110,80,240,.08)}
  .top-search .ic{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--soft);font-size:14px}
  .spacer{flex:1}
  .nav-btn{color:#46464f;font-weight:600;padding:9px 14px;border-radius:var(--r-pill);font-size:14px;transition:.15s}
  .nav-btn:hover{background:#f2f2f7}
  .nav-btn.badge{position:relative}
  .nav-btn .dot{position:absolute;top:0;right:4px;background:var(--danger);color:#fff;font-size:10px;
    font-weight:800;border-radius:10px;padding:0 5px;line-height:16px;box-shadow:0 0 0 2px #fff}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--grad);color:#fff;display:flex;
    align-items:center;justify-content:center;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(110,80,240,.3)}
  .menu{position:absolute;right:26px;top:60px;background:#fff;border:1px solid var(--border);border-radius:14px;
    box-shadow:var(--sh-lg);min-width:220px;padding:8px;z-index:40}
  .menu .who{padding:10px 12px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .menu .who b{display:block;font-size:14.5px}.menu .who small{color:var(--muted);font-size:12.5px}
  .menu button{display:block;width:100%;text-align:left;padding:10px 12px;border-radius:9px;color:#3a3a44;font-size:14px}
  .menu button:hover{background:#f4f4f9}
  main{max-width:1120px;margin:0 auto;padding:32px 26px 90px}

  /* HOME */
  .home-hero{position:relative;text-align:center;padding:52px 24px 30px;border-radius:26px;overflow:hidden;
    background:var(--grad-soft);border:1px solid #ececfb;margin-bottom:6px}
  .home-hero::before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;
    background:radial-gradient(circle,rgba(139,92,246,.16),transparent 70%);top:-120px;left:50%;transform:translateX(-50%)}
  .home-hero .eyebrow{position:relative;display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;
    color:var(--brand-ink);background:rgba(255,255,255,.7);padding:6px 14px;border-radius:var(--r-pill);
    border:1px solid #e5e0fb;margin-bottom:18px}
  .home-hero h1{position:relative;font-size:34px;font-weight:800;letter-spacing:-.035em;line-height:1.2}
  .home-hero p{position:relative;color:#5a5a6a;margin-top:10px;font-size:15.5px}
  .home-search{position:relative;max-width:600px;margin:26px auto 4px}
  .home-search input{width:100%;padding:17px 20px 17px 54px;font-size:16.5px;border:1px solid #e2def8;
    border-radius:var(--r-pill);outline:none;box-shadow:var(--sh);background:#fff}
  .home-search input:focus{border-color:var(--brand);box-shadow:0 0 0 5px rgba(110,80,240,.12),var(--sh)}
  .home-search .ic{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--brand);font-size:17px}
  .hot{position:relative;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .hot a{font-size:12.5px;color:#5e5e70;background:#fff;border:1px solid var(--border);padding:5px 13px;border-radius:var(--r-pill)}
  .hot a:hover{border-color:var(--brand);color:var(--brand)}
  .suggest{position:absolute;top:62px;left:0;right:0;background:#fff;border:1px solid var(--border);
    border-radius:16px;box-shadow:var(--sh-lg);overflow:hidden;z-index:20;text-align:left}
  .suggest .s-item{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer}
  .suggest .s-item:hover{background:#f6f5fe}
  .suggest .s-item .ico{width:30px;height:30px;border-radius:8px;background:var(--grad-soft);display:flex;
    align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .suggest .s-item .tag{font-size:11px;color:var(--muted);background:#f2f2f7;padding:3px 9px;border-radius:var(--r-pill)}
  .suggest .s-empty{padding:18px;color:var(--muted);text-align:center;font-size:13.5px}
  .section-title{font-size:17px;font-weight:800;letter-spacing:-.02em;margin:38px 0 16px;display:flex;align-items:center;gap:9px}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:16px}
  .cat-card{position:relative;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:22px;
    cursor:pointer;transition:transform .14s ease,box-shadow .2s ease,border-color .2s ease;overflow:hidden}
  .cat-card:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:#e0dcfa}
  .cat-card .emoji{width:46px;height:46px;border-radius:14px;background:var(--grad-soft);display:flex;
    align-items:center;justify-content:center;font-size:23px;margin-bottom:14px}
  .cat-card h3{font-size:15.5px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em}
  .cat-card p{font-size:12.5px;color:var(--muted);line-height:1.5}
  .cat-card .cnt{font-size:12px;color:var(--brand);font-weight:700;margin-top:12px}
  .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(264px,1fr));gap:16px}
  .doc-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;
    transition:transform .14s ease,box-shadow .2s ease,border-color .2s ease}
  .doc-card:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:#e0dcfa}
  .doc-card .cat{font-size:11.5px;color:var(--brand);font-weight:700}
  .doc-card h4{font-size:15.5px;font-weight:700;margin:7px 0 8px;line-height:1.45;letter-spacing:-.02em}
  .doc-card .excerpt{font-size:13px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .doc-card .meta{display:flex;gap:12px;font-size:11.5px;color:var(--soft);margin-top:13px}

  /* SEARCH */
  .results-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:20px}
  .results-head h2{font-size:21px;font-weight:800;letter-spacing:-.03em}
  .filters{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  .filters select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-pill);background:#fff;outline:none}
  .result-item{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:13px;
    cursor:pointer;transition:box-shadow .2s ease,border-color .2s ease}
  .result-item:hover{box-shadow:var(--sh);border-color:#e0dcfa}
  .result-item h4{font-size:16.5px;font-weight:700;margin-bottom:5px;letter-spacing:-.02em}
  .result-item .excerpt{color:var(--muted);font-size:13.5px}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
  .tags .t{font-size:11.5px;background:#f2f2f7;color:#5a5a66;padding:3px 11px;border-radius:var(--r-pill)}

  /* ARTICLE */
  .article{background:#fff;border:1px solid var(--border);border-radius:22px;padding:40px;max-width:840px;margin:0 auto;box-shadow:var(--sh-sm)}
  .breadcrumb{font-size:13px;color:var(--soft);margin-bottom:16px}
  .breadcrumb a{color:var(--soft)}
  .article h1{font-size:28px;font-weight:800;line-height:1.32;letter-spacing:-.035em;margin-bottom:14px}
  .article .a-meta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:13px;
    border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:24px}
  .article .a-body{font-size:15.5px;line-height:1.85;color:#2a2a32}
  .article .a-body h2{font-size:19px;font-weight:800;margin:26px 0 10px;letter-spacing:-.02em}
  .article .a-body h3{font-size:16px;font-weight:700;margin:20px 0 8px}
  .article .a-body p{margin:11px 0}.article .a-body ul,.article .a-body ol{margin:11px 0 11px 22px}
  .article .a-body li{margin:5px 0}.article .a-body strong{font-weight:700;color:var(--text)}
  .article .a-actions{display:flex;gap:8px;margin-top:30px;flex-wrap:wrap}
  .history{margin-top:26px;border-top:1px solid var(--line);padding-top:18px}
  .history h3{font-size:13.5px;margin-bottom:10px;color:var(--muted);font-weight:700}
  .history .h-row{font-size:13px;color:var(--muted);padding:5px 0}

  /* EDITOR */
  .editor{background:#fff;border:1px solid var(--border);border-radius:22px;padding:34px;max-width:840px;margin:0 auto;box-shadow:var(--sh-sm)}
  .editor h2{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:22px}
  .editor .field input,.editor .field select,.editor .field textarea{width:100%;padding:12px 14px;
    border:1px solid var(--border);border-radius:var(--r-sm);background:#fafafc;outline:none}
  .editor .field input:focus,.editor .field textarea:focus,.editor .field select:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px rgba(110,80,240,.1)}
  .toolbar{display:flex;gap:4px;border:1px solid var(--border);border-bottom:none;border-radius:var(--r-sm) var(--r-sm) 0 0;
    padding:7px;background:#fafafc;flex-wrap:wrap}
  .toolbar button{background:#fff;border:1px solid var(--border);border-radius:8px;min-width:34px;height:31px;
    font-weight:700;color:#3a3a44;font-size:13px;padding:0 8px}
  .toolbar button:hover{background:#f1f1f6}
  .toolbar .sep{width:1px;background:var(--border);margin:3px 4px}
  .wysiwyg{min-height:260px;border:1px solid var(--border);border-radius:0 0 var(--r-sm) var(--r-sm);padding:16px;
    background:#fff;outline:none;line-height:1.8}
  .wysiwyg:empty:before{content:attr(data-ph);color:#b5b5c0}
  .editor-actions{display:flex;gap:8px;margin-top:24px}
  .attach-list{margin-top:9px;display:flex;flex-direction:column;gap:7px}
  .attach-list .a-item{display:flex;align-items:center;gap:9px;font-size:13px;background:#f5f5fa;padding:8px 12px;border-radius:10px}
  .attach-list .a-item button{margin-left:auto;color:var(--danger);font-size:13px}

  /* DASHBOARD */
  .page-head{margin:6px 0 22px}
  .page-head h1{font-size:25px;font-weight:800;letter-spacing:-.035em}
  .page-head p{color:var(--muted);margin-top:5px;font-size:14.5px}
  .dash-tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:24px;flex-wrap:wrap}
  .dash-tabs button{padding:12px 16px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;font-size:14px}
  .dash-tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}
  .dash-tabs button .b{background:var(--danger);color:#fff;font-size:11px;border-radius:var(--r-pill);padding:0 7px;margin-left:6px;font-weight:800}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:15px;margin-bottom:28px}
  .stat{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh-sm)}
  .stat .n{font-size:28px;font-weight:800;letter-spacing:-.04em}
  .stat .l{font-size:13px;color:var(--muted);margin-top:3px}
  table.tbl{width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r);border-collapse:separate;border-spacing:0;overflow:hidden;box-shadow:var(--sh-sm)}
  table.tbl th{background:#fafafc;text-align:left;font-size:12.5px;color:var(--muted);padding:13px 16px;font-weight:700}
  table.tbl td{padding:13px 16px;border-top:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  table.tbl td .row-actions{display:flex;gap:6px;flex-wrap:wrap}
  .empty{text-align:center;color:var(--muted);padding:48px;background:#fff;border:1px dashed var(--border);border-radius:var(--r)}

  /* MODAL / TOAST */
  .modal-bg{position:fixed;inset:0;background:rgba(20,18,40,.45);backdrop-filter:blur(3px);display:flex;
    align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:18px;max-width:470px;width:100%;padding:26px;box-shadow:var(--sh-lg)}
  .modal h3{font-size:18px;font-weight:800;margin-bottom:10px;letter-spacing:-.02em}
  .modal textarea{width:100%;min-height:90px;padding:11px;border:1px solid var(--border);border-radius:12px;margin-top:10px;outline:none}
  .modal textarea:focus{border-color:var(--brand)}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#16161a;color:#fff;
    padding:13px 22px;border-radius:14px;font-size:14px;z-index:60;box-shadow:var(--sh-lg);opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:880px){#auth{grid-template-columns:1fr}.auth-hero{display:none}}

function loadLocal(){try{const r=JSON.parse(localStorage.getItem(LS));if(r&&r.users){if(!r.requests)r.requests=[];return r;}}catch(e){}const s=seed();localStorage.setItem(LS,JSON.stringify(s));return s;}
function save(){if(SUPA)return;localStorage.setItem(LS,JSON.stringify(DB));}
function me(){return DB.users.find(u=>u.email===DB.sessionEmail)||null;}
function isAdmin(){const m=me();return m&&m.role==='admin';}

function recentKey(){return 'circle_recent_'+(DB.sessionEmail||'x');}
function getRecent(){try{return JSON.parse(localStorage.getItem(recentKey()))||[];}catch(e){return[];}}
function setRecent(a){localStorage.setItem(recentKey(),JSON.stringify(a));}

function mapUser(r){return {email:r.email,name:r.name,dept:r.dept||'',role:r.role,status:r.status,joined:new Date(r.joined).getTime()};}
function mapArt(r){return {id:r.id,title:r.title,cat:r.cat,tags:r.tags||[],body:r.body||'',attach:r.attach||[],
  author:r.author_email,status:r.status,views:r.views||0,reject:r.reject||'',history:r.history||[],
  created:new Date(r.created_at).getTime(),updated:new Date(r.updated_at).getTime()};}
function mapReq(r){return {id:r.id,keyword:r.keyword,note:r.note||'',by:r.by_email,byName:r.by_name||'',status:r.status,created:new Date(r.created_at).getTime()};}
async function refetch(){
  if(!SUPA)return;
  const [{data:us},{data:ar},{data:rq}]=await Promise.all([
    sb.from('profiles').select('*'),
    sb.from('articles').select('*'),
    sb.from('review_requests').select('*')
  ]);
  DB.users=(us||[]).map(mapUser);
  DB.arts=(ar||[]).map(mapArt);
  DB.requests=(rq||[]).map(mapReq);
}

async function dataCreateArticle(d){
  const m=me();
  if(SUPA){
    const row={title:d.title,body:d.body,cat:d.cat,tags:d.tags,attach:d.attach,
      author_email:m.email,author_name:m.name,status:isAdmin()?'approved':'pending'};
    const {data,error}=await sb.from('articles').insert(row).select().single();
    if(error){toast('저장 실패: '+error.message);throw error;}
    DB.arts.push(mapArt(data));return;
  }
  const a={id:'d'+Math.random().toString(36).slice(2,9),...d,author:m.email,
    status:isAdmin()?'approved':'pending',views:0,created:Date.now(),updated:Date.now(),history:[],reject:''};
  DB.arts.push(a);save();
}
async function dataUpdateArticle(id,patch){
  if(SUPA){
    const m={updated_at:new Date().toISOString()};
    if('title' in patch)m.title=patch.title; if('body' in patch)m.body=patch.body;
    if('cat' in patch)m.cat=patch.cat; if('tags' in patch)m.tags=patch.tags;
    if('attach' in patch)m.attach=patch.attach; if('status' in patch)m.status=patch.status;
    if('reject' in patch)m.reject=patch.reject; if('history' in patch)m.history=patch.history;
    const {data,error}=await sb.from('articles').update(m).eq('id',id).select().single();
    if(error){toast('저장 실패: '+error.message);throw error;}
    const i=DB.arts.findIndex(x=>x.id===id);if(i>=0)DB.arts[i]=mapArt(data);return;
  }
  const a=DB.arts.find(x=>x.id===id);Object.assign(a,patch,{updated:Date.now()});save();
}
async function dataDeleteArticle(id){
  if(SUPA){const {error}=await sb.from('articles').delete().eq('id',id);if(error){toast('삭제 실패: '+error.message);throw error;}}
  DB.arts=DB.arts.filter(x=>x.id!==id);save();
}
async function dataIncViews(id){
  const a=DB.arts.find(x=>x.id===id);if(a)a.views++;
  if(SUPA){try{await sb.rpc('increment_views',{aid:id});}catch(e){}}else save();
}
async function dataSetProfile(email,patch){
  if(SUPA){const {error}=await sb.from('profiles').update(patch).eq('email',email);if(error){toast('처리 실패: '+error.message);throw error;}}
  const u=DB.users.find(x=>x.email===email);if(u)Object.assign(u,patch);save();
}
async function dataCreateRequest(keyword,note){
  const m=me();
  if(SUPA){
    const {data,error}=await sb.from('review_requests').insert({keyword,note,by_email:m.email,by_name:m.name,status:'open'}).select().single();
    if(error){toast('요청 실패: '+error.message);throw error;}
    DB.requests.push(mapReq(data));return;
  }
  DB.requests.push({id:'r'+Math.random().toString(36).slice(2,9),keyword,note,by:m.email,byName:m.name,status:'open',created:Date.now()});save();
}
async function dataUpdateRequest(id,patch){
  if(SUPA){const {error}=await sb.from('review_requests').update(patch).eq('id',id);if(error){toast('처리 실패: '+error.message);throw error;}}
  const r=DB.requests.find(x=>x.id===id);if(r)Object.assign(r,patch);save();
}
async function dataDeleteRequest(id){
  if(SUPA){const {error}=await sb.from('review_requests').delete().eq('id',id);if(error){toast('삭제 실패: '+error.message);throw error;}}
  DB.requests=DB.requests.filter(x=>x.id!==id);save();
}
function openRequests(){return DB.requests.filter(r=>r.status==='open');}

function visibleArts(){const m=me();return DB.arts.filter(d=>d.status==='approved'||(m&&(d.author===m.email||m.role==='admin')));}
function pendingDocs(){return DB.arts.filter(d=>d.status==='pending');}
function pendingUsers(){return DB.users.filter(u=>u.status==='pending');}
function refreshAdminDot(){
  const n=pendingDocs().length+pendingUsers().length+openRequests().length;
  const dot=document.getElementById('adminDot');
  if(isAdmin()&&n>0){dot.classList.remove('hidden');dot.textContent=n;}else{dot.classList.add('hidden');}

function routeUser(){
  const m=me();
  if(!m)return showAuthScreen();
  if(m.status==='new')return showApply();
  if(m.status==='pending')return showGate('pending');

}

  document.getElementById('gate').classList.add('hidden');

function showGate(kind){

async function logout(){
  if(SUPA){try{await sb.auth.signOut();}catch(e){}}

}

async function liveBoot(){
  sb=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
  sb.auth.onAuthStateChange((_e,session)=>{handleSession(session);});
  const {data:{session}}=await sb.auth.getSession();
  handleSession(session);
}
let gating=false;
async function handleSession(session){
  if(gating)return;gating=true;
  try{
    if(!session){showAuthScreen();return;}
    DB.sessionEmail=(session.user.email||'').toLowerCase();
    await refetch();
    const m=me();
    if(!m){await sb.auth.signOut();DB.sessionEmail=null;showAuthScreen();
      authMsg('loginMsg','회사 계정(@'+CONFIG.ALLOWED_DOMAIN+')만 이용할 수 있습니다.','err');return;}
    if(m.status==='new'){showApply();return;}
    if(m.status==='pending'){showGate('pending');return;}
    if(m.status==='removed'){showGate('removed');return;}
    enterApp();
  }finally{gating=false;}
}

/* ====================== HELPERS ====================== */
function val(id){return document.getElementById(id).value;}
function clear(...ids){ids.forEach(i=>document.getElementById(i).value='');}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent||'';}
function fmtDate(t){const d=new Date(t);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function ago(t){const s=(Date.now()-t)/1000;if(s<3600)return Math.floor(s/60)+'분 전';if(s<86400)return Math.floor(s/3600)+'시간 전';return Math.floor(s/86400)+'일 전';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
function toggleMenu(){document.getElementById('userMenu').classList.toggle('hidden');}
function openERP(){if(CONFIG.ERP_URL){window.open(CONFIG.ERP_URL,'_blank','noopener,noreferrer');}else{toast('ERP 주소가 아직 설정되지 않았습니다. index.html의 CONFIG에서 ERP_URL을 입력하세요.');}}
document.addEventListener('click',e=>{const m=document.getElementById('userMenu');if(m&&!m.classList.contains('hidden')&&!m.contains(e.target)&&e.target.id!=='avatar')m.classList.add('hidden');});
function hl(text,q){if(!q)return esc(text);const i=text.toLowerCase().indexOf(q.toLowerCase());if(i<0)return esc(text);return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));}
function authorName(email){const u=DB.users.find(x=>x.email===email);return u?u.name:(email||'').split('@')[0];}

/* ====================== ROUTER ====================== */
let STATE={q:'',catFilter:'',sort:'rel',dashTab:'users',view:''};
function go(view,arg){
  document.getElementById('userMenu').classList.add('hidden');
  STATE.view=view;
  if(view==='home')renderHome();
  else if(view==='search')renderSearch(arg!==undefined?arg:STATE.q);
  else if(view==='category')renderCategory(arg);
  else if(view==='article')renderArticle(arg);
  else if(view==='editor')renderEditor(arg);
  else if(view==='dash'){if(!isAdmin())return toast('관리자만 접근할 수 있습니다.');renderDash();}
  else if(view==='mine')renderMine();
  window.scrollTo(0,0);
}

function docCard(d){return `

function buildSuggest(q){
  q=q.trim();if(!q)return '';
  const arts=visibleArts().filter(d=>d.status==='approved');const ql=q.toLowerCase();
  const scored=arts.map(d=>{let s=0;const t=d.title.toLowerCase();
    if(t.startsWith(ql))s+=100;else if(t.includes(ql))s+=60;
    if(d.tags.some(x=>x.toLowerCase().includes(ql)))s+=40;
    if(stripHtml(d.body).toLowerCase().includes(ql))s+=15;return {d,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,6);
  if(!scored.length)return `<div class="suggest"><div class="s-empty">"${esc(q)}"에 대한 결과가 없습니다. Enter로 전체 검색</div></div>`;
  return `<div class="suggest">${scored.map(({d})=>`
    <div class="s-item" onclick="openDoc('${d.id}')"><span class="ico">📄</span>
      <div style="flex:1"><div>${hl(d.title,q)}</div></div><span class="tag">${catName(d.cat)}</span></div>`).join('')}</div>`;
}

/* ====================== SEARCH ====================== */
function renderSearch(q){
  STATE.view='search';STATE.q=q;const ql=(q||'').trim().toLowerCase();
  let res=visibleArts().filter(d=>d.status==='approved').map(d=>{
    let s=0;const t=d.title.toLowerCase(),body=stripHtml(d.body).toLowerCase();
    if(t.includes(ql))s+=60;if(d.tags.some(x=>x.toLowerCase().includes(ql)))s+=40;
    if(body.includes(ql))s+=20;s+=d.views*0.05;return {d,s};
  }).filter(x=>!ql||x.s>0);
  if(STATE.catFilter)res=res.filter(x=>x.d.cat===STATE.catFilter);
  if(STATE.sort==='rel')res.sort((a,b)=>b.s-a.s);
  if(STATE.sort==='new')res.sort((a,b)=>b.d.updated-a.d.updated);
  if(STATE.sort==='views')res.sort((a,b)=>b.d.views-a.d.views);
  document.getElementById('view').innerHTML=`
    <div class="results-head">
      <h2>'${esc(q||'전체')}' 검색 결과 <span style="color:var(--muted);font-weight:600">${res.length}건</span></h2>
      <div class="filters">
        <select onchange="STATE.catFilter=this.value;renderSearch(STATE.q)">
          <option value="">전체 카테고리</option>
          ${CATEGORIES.map(c=>`<option value="${c.id}" ${STATE.catFilter===c.id?'selected':''}>${c.name}</option>`).join('')}
        </select>
        <select onchange="STATE.sort=this.value;renderSearch(STATE.q)">
          <option value="rel" ${STATE.sort==='rel'?'selected':''}>관련도순</option>
          <option value="new" ${STATE.sort==='new'?'selected':''}>최신순</option>
          <option value="views" ${STATE.sort==='views'?'selected':''}>조회수순</option>
        </select>
      </div>
    </div>
    ${res.length?res.map(({d})=>`
      <div class="result-item" onclick="openDoc('${d.id}')">
        <div class="cat" style="font-size:12px;color:var(--brand);font-weight:700">${catName(d.cat)}</div>
        <h4>${hl(d.title,ql)}</h4>
        <div class="excerpt">${hl(stripHtml(d.body).slice(0,140),ql)}…</div>
        <div class="tags">${d.tags.map(t=>`<span class="t">#${esc(t)}</span>`).join('')}</div>
        <div class="meta" style="display:flex;gap:12px;font-size:12px;color:var(--soft);margin-top:9px">
          <span>👁 ${d.views}</span><span>✍ ${authorName(d.author)}</span><span>${fmtDate(d.updated)}</span></div>
      </div>`).join('')+`<div style="text-align:center;margin-top:20px"><button class="btn outline sm" onclick="askReview()">🔎 원하는 내용을 못 찾으셨나요? 검토 요청하기</button></div>`:`<div class="empty">'${esc(q||'')}'에 대한 검색 결과가 없습니다.<div style="margin-top:16px"><button class="btn grad sm" onclick="askReview()">🔎 이 키워드 검토 요청하기</button></div></div>`}`;
  const ts=document.getElementById('topSearch');if(ts&&ts.value!==q)ts.value=q;
}

async function submitDoc(){
  const data=collectDoc();
  if(!data.title)return toast('제목을 입력해주세요.');
  if(!stripHtml(data.body).trim())return toast('본문을 입력해주세요.');
  const admin=isAdmin(),m=me();
  try{
    if(EDIT_ID){
      const d=DB.arts.find(x=>x.id===EDIT_ID);
      const history=[...(d.history||[]),{t:Date.now(),by:m.name,note:'내용 수정'}];
      await dataUpdateArticle(EDIT_ID,{...data,status:admin?'approved':'pending',history});
      toast(admin?'문서를 수정했습니다.':'수정 사항이 승인 요청되었습니다.');
    }else{
      await dataCreateArticle(data);
      toast(admin?'문서를 발행했습니다.':'업로드 완료! 관리자 승인 후 공개됩니다.');
    }
  }catch(e){return;}
  clearDraft();refreshAdminDot();go(admin?'home':'mine');
}

/* ====================== MINE + POINTS ====================== */
const POINT_NEW=10, POINT_UPDATE=2, COUPON_COST=30;
function pointsFor(email){
  let pts=0,posts=0,updates=0;
  DB.arts.filter(d=>d.author===email&&d.status==='approved').forEach(d=>{posts++;pts+=POINT_NEW;const u=(d.history||[]).length;updates+=u;pts+=u*POINT_UPDATE;});
  return {pts,posts,updates};
}
function myPoints(){return pointsFor(me().email);}
function requestCoupon(cost,name){
  const {pts}=myPoints();
  if(pts<cost)return toast(`${cost}P가 필요합니다. (현재 ${pts}P)`);
  toast(`${name} 신청 완료! 관리자 확인 후 지급됩니다. ☕`);
}
function rewardCard(emoji,name,desc,cost,pts){
  const ok=pts>=cost;
  return `<div style="background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px;display:flex;align-items:center;gap:14px">
    <div style="width:48px;height:48px;border-radius:14px;background:var(--grad-soft);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${emoji}</div>
    <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14.5px">${name}</div><div style="font-size:12.5px;color:var(--muted)">${desc} · ${cost}P</div></div>
    <button class="btn ${ok?'grad':'ghost'} sm" ${ok?'':'disabled style="opacity:.55;cursor:not-allowed"'} onclick="requestCoupon(${cost},'${name}')">${ok?'신청하기':cost+'P 필요'}</button>
  </div>`;
}
function renderMine(){
  const m=me();const docs=DB.arts.filter(d=>d.author===m.email).sort((a,b)=>b.updated-a.updated);
  const {pts,posts,updates}=myPoints();
  const pct=Math.min(100,Math.round(pts/COUPON_COST*100));const can=pts>=COUPON_COST;
  document.getElementById('view').innerHTML=`
    <div class="page-head"><h1>내 작성 글</h1><p>총 ${docs.length}개 · 문서 상태와 포인트를 확인하세요.</p></div>

    <div style="background:var(--grad-soft);border:1px solid #ececfb;border-radius:20px;padding:24px;margin-bottom:24px;display:flex;gap:28px;align-items:center;flex-wrap:wrap">
      <div style="flex:1;min-width:240px">
        <div style="font-size:12.5px;color:var(--brand-ink);font-weight:700;letter-spacing:.02em">⭐ 내 포인트</div>
        <div style="font-size:36px;font-weight:800;letter-spacing:-.04em;color:var(--brand-ink);line-height:1.1;margin-top:2px">${pts}<span style="font-size:17px;font-weight:700"> P</span></div>
        <div style="font-size:12.5px;color:#6a6a7a;margin-top:3px">문서 발행 ${posts}개 (×${POINT_NEW}P) · 승인된 수정 ${updates}회 (×${POINT_UPDATE}P)</div>
        <div style="height:9px;background:#fff;border-radius:99px;margin-top:14px;overflow:hidden;border:1px solid #e6e2f8">
          <div style="height:100%;width:${pct}%;background:var(--grad);transition:width .4s"></div>
        </div>
        <div style="font-size:12px;color:#6a6a7a;margin-top:7px">${can?'🎉 이제 커피 쿠폰을 신청할 수 있어요!':`커피 쿠폰까지 ${COUPON_COST-pts}P 남았어요 (목표 ${COUPON_COST}P)`}</div>
      </div>
    </div>

    <div class="section-title">🎁 포인트 리워드</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:8px">
      ${rewardCard('☕','아메리카노 쿠폰','사내 카페테리아',COUPON_COST,pts)}
      ${rewardCard('🍰','커피 + 디저트 세트','사내 카페테리아',50,pts)}
    </div>
    <div class="note" style="color:var(--soft);font-size:12px;margin-bottom:8px">포인트는 문서가 공개(승인)되면 적립됩니다. 쿠폰 신청 내역은 관리자에게 전달됩니다.</div>

    <div class="section-title">📄 내 문서</div>
    ${docs.length?`<table class="tbl"><thead><tr><th>제목</th><th>카테고리</th><th>상태</th><th>조회</th><th>수정일</th><th></th></tr></thead><tbody>
      ${docs.map(d=>`<tr>
        <td><a href="#" onclick="go('article','${d.id}');return false">${esc(d.title)}</a></td>
        <td>${catName(d.cat)}</td>
        <td><span class="pill ${d.status}">${({approved:'공개',pending:'승인 대기',rejected:'반려',hidden:'비공개'})[d.status]}</span></td>
        <td>${d.views}</td><td>${fmtDate(d.updated)}</td>
        <td><button class="btn ghost sm" onclick="go('editor','${d.id}')">수정</button></td>
      </tr>`).join('')}</tbody></table>`:`<div class="empty">아직 작성한 글이 없습니다. <a href="#" onclick="go('editor');return false">새 글 작성하기</a></div>`}`;
}

/* ====================== DASHBOARD ====================== */
function renderDash(){
  STATE.view='dash';
  const pu=pendingUsers(),pd=pendingDocs();
  const approved=DB.arts.filter(d=>d.status==='approved').length;
  const activeU=DB.users.filter(u=>u.status==='active').length;
  const totalViews=DB.arts.reduce((s,d)=>s+d.views,0);
  const totalPts=DB.users.reduce((s,u)=>s+pointsFor(u.email).pts,0);
  document.getElementById('view').innerHTML=`
    <div class="page-head"><h1>👑 관리자 대시보드</h1><p>가입자 승인, 콘텐츠 검토, 활동 통계를 관리합니다.</p></div>
    <div class="stat-grid">
      <div class="stat"><div class="n">${activeU}</div><div class="l">가입자</div></div>
      <div class="stat"><div class="n">${approved}</div><div class="l">공개 문서</div></div>
      <div class="stat"><div class="n" style="color:var(--warn)">${pd.length}</div><div class="l">승인 대기 문서</div></div>
      <div class="stat"><div class="n" style="color:var(--warn)">${pu.length}</div><div class="l">가입 승인 대기</div></div>
      <div class="stat"><div class="n">${totalViews}</div><div class="l">누적 조회수</div></div>
      <div class="stat"><div class="n">${totalPts}<span style="font-size:15px"> P</span></div><div class="l">누적 발행 포인트</div></div>
    </div>
    <div class="dash-tabs">
      <button class="${STATE.dashTab==='users'?'active':''}" onclick="STATE.dashTab='users';renderDash()">가입 승인 ${pu.length?`<span class="b">${pu.length}</span>`:''}</button>
      <button class="${STATE.dashTab==='members'?'active':''}" onclick="STATE.dashTab='members';renderDash()">사용자 관리</button>
      <button class="${STATE.dashTab==='content'?'active':''}" onclick="STATE.dashTab='content';renderDash()">콘텐츠 승인 ${pd.length?`<span class="b">${pd.length}</span>`:''}</button>
      <button class="${STATE.dashTab==='reviews'?'active':''}" onclick="STATE.dashTab='reviews';renderDash()">검토 요청 ${openRequests().length?`<span class="b">${openRequests().length}</span>`:''}</button>
      <button class="${STATE.dashTab==='all'?'active':''}" onclick="STATE.dashTab='all';renderDash()">전체 콘텐츠</button>
    </div>
    <div id="dashBody"></div>`;
  renderDashBody();
}
function renderDashBody(){
  const b=document.getElementById('dashBody');
  if(STATE.dashTab==='users'){
    const pu=pendingUsers();
    b.innerHTML=pu.length?`<table class="tbl"><thead><tr><th>이름</th><th>이메일</th><th>부서</th><th>신청일</th><th>처리</th></tr></thead><tbody>
      ${pu.map(u=>`<tr><td>${esc(u.name)}</td><td>${esc(u.email)}</td><td>${esc(u.dept||'-')}</td><td>${ago(u.joined)}</td>
        <td><div class="row-actions"><button class="btn ok sm" onclick="approveUser('${u.email}')">승인</button>
        <button class="btn danger sm" onclick="rejectUser('${u.email}')">거절</button></div></td></tr>`).join('')}</tbody></table>`
      :`<div class="empty">승인 대기 중인 가입 신청이 없습니다.</div>`;
  }else if(STATE.dashTab==='members'){
    const us=DB.users.filter(u=>u.status==='active'||u.status==='removed');
    b.innerHTML=`<table class="tbl"><thead><tr><th>이름</th><th>이메일</th><th>부서</th><th>권한</th><th>포인트</th><th>상태</th><th>관리</th></tr></thead><tbody>
      ${us.map(u=>`<tr><td>${esc(u.name)}</td><td>${esc(u.email)}</td><td>${esc(u.dept||'-')}</td>
        <td>${u.role==='admin'?'👑 관리자':'일반'}</td>
        <td style="font-weight:700;color:var(--brand-ink)">${pointsFor(u.email).pts} P</td>
        <td><span class="pill ${u.status==='active'?'approved':'rejected'}">${u.status==='active'?'활성':'퇴장'}</span></td>
        <td><div class="row-actions">${u.email!==me().email?`
            <button class="btn outline sm" onclick="toggleRole('${u.email}')">${u.role==='admin'?'관리자 해제':'관리자 지정'}</button>
            ${u.status==='active'?`<button class="btn danger sm" onclick="removeUser('${u.email}')">강제 퇴장</button>`:`<button class="btn ok sm" onclick="restoreUser('${u.email}')">복구</button>`}
          `:'<small style="color:var(--muted)">본인</small>'}</div></td></tr>`).join('')}</tbody></table>`;
  }else if(STATE.dashTab==='content'){
    const pd=pendingDocs();
    b.innerHTML=pd.length?pd.map(d=>`
      <div class="result-item" style="cursor:default">
        <div style="display:flex;align-items:start;gap:12px;flex-wrap:wrap">
          <div style="flex:1">
            <div class="cat" style="color:var(--brand);font-weight:700;font-size:12px">${catName(d.cat)} · ${authorName(d.author)} · ${ago(d.created)}</div>
            <h4 style="margin:6px 0"><a href="#" onclick="go('article','${d.id}');return false">${esc(d.title)}</a></h4>
            <div class="excerpt" style="color:var(--muted);font-size:13.5px">${esc(stripHtml(d.body).slice(0,120))}…</div>
          </div>
          <div class="row-actions"><button class="btn ok sm" onclick="approveDoc('${d.id}')">승인</button>
            <button class="btn danger sm" onclick="askReject('${d.id}')">반려</button></div>
        </div></div>`).join(''):`<div class="empty">검토할 콘텐츠가 없습니다.</div>`;
  }else if(STATE.dashTab==='reviews'){
    const rs=[...DB.requests].sort((a,b)=>(a.status===b.status?b.created-a.created:(a.status==='open'?-1:1)));
    b.innerHTML=rs.length?rs.map(r=>`
      <div class="result-item" style="cursor:default;${r.status==='done'?'opacity:.6':''}">
        <div style="display:flex;align-items:start;gap:12px;flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;color:var(--muted)">${esc(r.byName||authorName(r.by))} · ${ago(r.created)} ${r.status==='done'?'<span class="pill approved" style="margin-left:6px">처리완료</span>':'<span class="pill pending" style="margin-left:6px">대기</span>'}</div>
            <h4 style="margin:6px 0;font-size:16px">🔎 ${esc(r.keyword)}</h4>
            ${r.note?`<div class="excerpt" style="color:var(--muted);font-size:13.5px">${esc(r.note)}</div>`:''}
          </div>
          <div class="row-actions">
            <button class="btn ghost sm" onclick="go('editor')">글 작성</button>
            ${r.status==='open'?`<button class="btn ok sm" onclick="resolveRequest('${r.id}')">완료 처리</button>`:`<button class="btn outline sm" onclick="reopenRequest('${r.id}')">되돌리기</button>`}
            <button class="btn danger sm" onclick="deleteRequest('${r.id}')">삭제</button>
          </div>
        </div>
      </div>`).join(''):`<div class="empty">접수된 검토 요청이 없습니다.</div>`;
  }else if(STATE.dashTab==='all'){
    const ds=[...DB.arts].sort((a,b)=>b.updated-a.updated);
    b.innerHTML=`<table class="tbl"><thead><tr><th>제목</th><th>카테고리</th><th>작성자</th><th>상태</th><th>조회</th><th>관리</th></tr></thead><tbody>
      ${ds.map(d=>`<tr>
        <td><a href="#" onclick="go('article','${d.id}');return false">${esc(d.title)}</a></td>
        <td>${catName(d.cat)}</td><td>${authorName(d.author)}</td>
        <td><span class="pill ${d.status}">${({approved:'공개',pending:'대기',rejected:'반려',hidden:'비공개'})[d.status]}</span></td>
        <td>${d.views}</td>
        <td><div class="row-actions"><button class="btn outline sm" onclick="toggleHide('${d.id}')">${d.status==='hidden'?'공개':'비공개'}</button>
          <button class="btn danger sm" onclick="delDoc('${d.id}')">삭제</button></div></td></tr>`).join('')}</tbody></table>`;
  }
}

/* ====== admin actions ====== */
async function approveUser(email){try{await dataSetProfile(email,{status:'active'});}catch(e){return;}refreshAdminDot();renderDash();toast('가입을 승인했습니다.');}
async function rejectUser(email){if(!confirm('가입 신청을 거절(차단)하시겠습니까?'))return;try{await dataSetProfile(email,{status:'removed'});}catch(e){return;}refreshAdminDot();renderDash();toast('가입 신청을 거절했습니다.');}
async function toggleRole(email){const u=DB.users.find(x=>x.email===email);const toAdmin=u.role!=='admin';if(!confirm(toAdmin?`${u.name} 님을 총괄관리자로 지정하시겠습니까?\n모든 콘텐츠·사용자·승인 권한을 갖게 됩니다.`:`${u.name} 님의 관리자 권한을 해제하시겠습니까?`))return;try{await dataSetProfile(email,{role:toAdmin?'admin':'user'});}catch(e){return;}renderDash();toast(toAdmin?'관리자로 지정했습니다.':'관리자 권한을 해제했습니다.');}
async function removeUser(email){if(!confirm('해당 사용자를 강제 퇴장시키겠습니까? 로그인이 차단됩니다.'))return;try{await dataSetProfile(email,{status:'removed'});}catch(e){return;}renderDash();toast('사용자를 퇴장 처리했습니다.');}
async function restoreUser(email){try{await dataSetProfile(email,{status:'active'});}catch(e){return;}renderDash();toast('사용자를 복구했습니다.');}
async function approveDoc(id){try{await dataUpdateArticle(id,{status:'approved'});}catch(e){return;}refreshAdminDot();if(STATE.view==='dash')renderDash();else go('article',id);toast('콘텐츠를 승인했습니다.');}
let REJECT_ID=null;
function askReject(id){REJECT_ID=id;showModal(`<h3>콘텐츠 반려</h3><p style="color:var(--muted);font-size:13.5px">작성자에게 전달할 반려 사유를 입력하세요.</p>
  <textarea id="rejectReason" placeholder="예: 예산 수치가 최신 기준과 다릅니다. 2026년 단가로 수정 바랍니다."></textarea>
  <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn danger" onclick="confirmReject()">반려</button></div>`);}
async function confirmReject(){const r=val('rejectReason')||'';try{await dataUpdateArticle(REJECT_ID,{status:'rejected',reject:r});}catch(e){return;}closeModal();refreshAdminDot();if(STATE.view==='dash')renderDash();else go('article',REJECT_ID);toast('콘텐츠를 반려했습니다.');}
async function toggleHide(id){const d=DB.arts.find(x=>x.id===id);const ns=d.status==='hidden'?'approved':'hidden';try{await dataUpdateArticle(id,{status:ns});}catch(e){return;}if(STATE.view==='dash')renderDash();else go('article',id);toast(ns==='hidden'?'비공개로 전환했습니다.':'공개로 전환했습니다.');}
async function delDoc(id){if(!confirm('이 문서를 삭제하시겠습니까? 되돌릴 수 없습니다.'))return;try{await dataDeleteArticle(id);}catch(e){return;}refreshAdminDot();if(STATE.view==='dash')renderDash();else go('home');toast('문서를 삭제했습니다.');}
async function resolveRequest(id){try{await dataUpdateRequest(id,{status:'done'});}catch(e){return;}refreshAdminDot();renderDash();toast('검토 요청을 완료 처리했습니다.');}
async function reopenRequest(id){try{await dataUpdateRequest(id,{status:'open'});}catch(e){return;}refreshAdminDot();renderDash();toast('검토 요청을 다시 열었습니다.');}
async function deleteRequest(id){if(!confirm('이 검토 요청을 삭제하시겠습니까?'))return;try{await dataDeleteRequest(id);}catch(e){return;}refreshAdminDot();renderDash();toast('검토 요청을 삭제했습니다.');}

/* ====== modal ====== */
function showModal(html){const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalBg';bg.innerHTML=`<div class="modal">${html}</div>`;bg.onclick=e=>{if(e.target===bg)closeModal();};document.body.appendChild(bg);}
function closeModal(){const m=document.getElementById('modalBg');if(m)m.remove();}

/* ====== 검토 요청 ====== */
function askReview(k){
  const kw=(k!==undefined?k:(STATE.q||''));
  showModal(`<h3>🔎 검토 요청</h3>
    <p style="color:var(--muted);font-size:13.5px">찾으시는 내용이 없나요? 필요한 키워드를 관리자에게 보내 문서 작성을 요청할 수 있습니다.</p>
    <div class="field" style="margin-top:12px"><label>키워드 / 찾는 내용</label><input id="rvKw" value="${esc(kw)}" placeholder="예: 출장비 정산 규정"></div>
    <textarea id="rvNote" placeholder="어떤 내용이 필요한지 자세히 적어주세요 (선택)"></textarea>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">취소</button><button class="btn grad" onclick="submitReview()">검토 요청 보내기</button></div>`);
  setTimeout(()=>{const el=document.getElementById('rvKw');if(el&&!el.value)el.focus();},50);
}
async function submitReview(){
  const kw=val('rvKw').trim();if(!kw)return toast('찾는 키워드를 입력해주세요.');
  const note=(document.getElementById('rvNote').value||'').trim();
  try{await dataCreateRequest(kw,note);}catch(e){return;}
  closeModal();refreshAdminDot();toast('검토 요청이 접수되었습니다. 관리자가 확인 후 반영합니다.');
}

/* ====================== INIT ====================== */
(function init(){
  configureAuthUI();
  if(SUPA){
    let tries=0;const w=setInterval(()=>{
      if(window.supabase&&window.supabase.createClient){clearInterval(w);liveBoot();}
      else if(++tries>40){clearInterval(w);toast('Supabase 라이브러리를 불러오지 못했습니다.');}
    },150);
  }else{
    DB=loadLocal();
  }
})();
</script>
</body>
</html>
